<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>אבולוציה סכמטית — מפת מערכת Claude</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>"/>
<link rel="stylesheet" href="css/styles.css?v=3"/>
</head>
<body class="dark-theme">

<div id="app">

  <!-- Header -->
  <div id="header">
    <button class="btn-icon hdr-btn" onclick="toggleSidebar()" title="תפריט">☰</button>
    <span class="logo" style="font-size:22px;margin:0 6px">🧠</span>
    <div style="flex:1;min-width:0">
      <div class="header-title" id="viewTitle">מפת המערכת הגלובלית</div>
      <div class="last-updated" id="lastUpdated" style="font-size:11px;color:#94A3B8;margin-top:1px"></div>
    </div>
    <button class="btn-icon hdr-btn" id="btnRefresh" onclick="refreshData()" title="רענן">↺</button>
  </div>

  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">
      <div style="padding:14px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94A3B8">
        פרויקטים
      </div>
      <div id="projectList">
        <!-- populated by app.js -->
      </div>
      <div style="padding:8px 16px 14px;border-top:1px solid #1E3A5F;margin-top:8px">
        <div class="sidebar-item" data-view="global" onclick="setView('global')" style="font-weight:700;color:#38BDF8">
          <span style="font-size:16px">🌐</span>
          <span class="sidebar-label">מפה גלובלית</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas">
      <div id="contentArea"></div>
      <div id="loadingOverlay" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;background:rgba(10,15,30,0.85)">
        <div class="spinner" style="width:40px;height:40px;border:3px solid #1E3A5F;border-top-color:#38BDF8;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <div class="loading-text" style="color:#94A3B8;font-size:14px">טוען נתונים...</div>
      </div>
      <div id="errorMsg" style="display:none"></div>
    </div>

  </div><!-- /main -->

</div><!-- /app -->

<!-- Tooltip for leaf node details -->
<div id="tooltip"></div>

<!-- Expand / Collapse All button — fixed bottom-left -->
<button id="btn-expand-all" onclick="toggleExpandAll()">הרחב הכל</button>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
#canvas { flex:1; overflow:auto; position:relative; padding:16px; }
#contentArea { min-height: 400px; }
.svg-wrap { overflow: auto; }
.nav-bar { display:flex; align-items:center; gap:10px; padding:8px 14px; margin-bottom:10px; background:rgba(30,41,59,0.6); border-radius:10px; font-size:13px; }
.btn-back-nav { background:none; border:none; cursor:pointer; color:#38BDF8; font-size:13px; font-family:Heebo,sans-serif; padding:4px 8px; border-radius:6px; }
.btn-back-nav:hover { background:rgba(56,189,248,0.12); }
.crumb-trail { color:#94A3B8; }
.crumb { color:#64748B; }
.d3lnk { pointer-events:none; }
.d3nd { cursor:pointer; }
.d3lf { cursor:default; }
#sidebar { width:260px; flex-shrink:0; background:#111827; border-left:1px solid #1E3A5F; padding:8px 0; overflow-y:auto; display:flex; flex-direction:column; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer; font-size:14px; font-family:Heebo,sans-serif; color:#D1D5DB; border-radius:8px; margin:1px 6px; transition:background 0.14s; }
.sidebar-item:hover { background:#1E293B; }
.sidebar-item.active { background:rgba(56,189,248,0.10); color:#38BDF8; }
.sidebar-label { flex:1; }
.sidebar-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; font-size:11px; font-weight:700; }
#header { height:56px; background:rgba(17,24,39,0.95); border-bottom:1px solid #1E3A5F; display:flex; align-items:center; gap:8px; padding:0 14px; flex-shrink:0; }
.header-title { font-size:16px; font-weight:700; color:#F1F5F9; font-family:Heebo,sans-serif; }
.hdr-btn { width:36px; height:36px; border-radius:50%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#94A3B8; font-size:18px; transition:0.15s; }
.hdr-btn:hover { background:#1E293B; color:#38BDF8; }
.logo { color:#38BDF8; }
#app { display:flex; flex-direction:column; min-height:100vh; }
#main { display:flex; flex:1; overflow:hidden; height:calc(100vh - 56px); }
body { background:#0A0F1E; font-family:Heebo,sans-serif; direction:rtl; -webkit-font-smoothing:antialiased; }
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');
</style>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/colors.js?v=3"></script>
<script src="js/mindmap.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
