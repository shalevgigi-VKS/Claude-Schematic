<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>אבולוציה סכמטית — מפת מערכת Claude</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap"/>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <button class="hdr-btn" onclick="toggleSidebar()" title="תפריט">☰</button>
    <span class="logo">🧠</span>
    <div style="flex:1;min-width:0">
      <div class="header-title" id="viewTitle">מפת המערכת הגלובלית</div>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
    <button class="hdr-btn" id="btnRefresh" onclick="refreshData()" title="רענן">↺</button>
  </div>

  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section-title">פרויקטים</div>
      <div id="projectList"></div>
      <div class="sidebar-footer">
        <div class="sidebar-item active" data-view="global" onclick="setView('global')">
          <span style="font-size:15px">🌐</span>
          <span class="sidebar-label">מפה גלובלית</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas">
      <div id="contentArea"></div>
      <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">טוען נתונים...</div>
      </div>
      <div id="errorMsg"></div>
    </div>

  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Expand/Collapse All -->
<button id="btn-expand-all" onclick="toggleExpandAll()">הרחב הכל</button>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #F8FAFC;
  --surface:      #FFFFFF;
  --border:       rgba(100,116,139,0.16);
  --border-md:    rgba(100,116,139,0.28);
  --text:         #1E293B;
  --text-muted:   #64748B;
  --text-dim:     #94A3B8;
  --accent:       #6366F1;
  --header-h:     54px;
  --sidebar-w:    248px;
}

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}

#app  { display: flex; flex-direction: column; min-height: 100vh; }
#main { display: flex; flex: 1; overflow: hidden; height: calc(100vh - var(--header-h)); }

/* Header */
#header {
  height: var(--header-h);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(15,23,42,0.06);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 20px; flex-shrink: 0; }
.header-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  background: linear-gradient(120deg, #6366F1, #A855F7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.last-updated { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.hdr-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 17px; transition: all 0.15s;
  flex-shrink: 0;
}
.hdr-btn:hover { background: #F1F5F9; color: var(--accent); }

/* Sidebar */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.sidebar-section-title {
  padding: 14px 16px 6px;
  font-size: 10px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.12em;
}
.sidebar-footer {
  padding: 6px 6px 12px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 16px; cursor: pointer; font-size: 13px;
  font-family: 'Heebo', sans-serif; color: var(--text);
  border-radius: 8px; margin: 1px 6px; transition: background 0.12s;
}
.sidebar-item:hover { background: #F8FAFC; }
.sidebar-item.active { background: #EEF2FF; color: var(--accent); font-weight: 600; }
.sidebar-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; border-radius: 6px;
  font-size: 11px; font-weight: 700; padding: 0 4px;
}

/* Canvas */
#canvas { flex: 1; overflow: auto; position: relative; padding: 16px; }
#contentArea { min-height: 400px; }
.svg-wrap { overflow: auto; }

/* Nav bar */
.nav-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; margin-bottom: 10px;
  background: rgba(241,245,249,0.8);
  border-radius: 10px; font-size: 13px;
}
.btn-back-nav {
  background: none; border: none; cursor: pointer;
  color: var(--accent); font-size: 13px;
  font-family: 'Heebo', sans-serif; padding: 4px 10px;
  border-radius: 6px; font-weight: 600;
}
.btn-back-nav:hover { background: #EEF2FF; }
.crumb-trail { color: var(--text-muted); }
.crumb { color: var(--text-dim); }

/* D3 node helpers */
.d3lnk { pointer-events: none; }
.d3nd  { cursor: pointer; }
.d3lf  { cursor: default; }

/* Loading overlay */
#loadingOverlay {
  display: none; position: absolute; inset: 0;
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  z-index: 100; background: rgba(248,250,252,0.88); backdrop-filter: blur(8px);
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid rgba(99,102,241,0.15); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }

/* Error */
#errorMsg {
  display: none; background: #FFF1F2; border: 1px solid #FDA4AF;
  color: #BE123C; border-radius: 12px; padding: 16px 22px;
  margin: 30px auto; max-width: 400px; text-align: center; font-size: 14px;
}

/* Tooltip */
#tooltip {
  display: none; position: fixed; z-index: 500;
  background: rgba(255,255,255,0.97);
  border: 1px solid rgba(100,116,139,0.18);
  border-radius: 12px; padding: 12px 16px;
  max-width: 250px; min-width: 160px;
  box-shadow: 0 8px 32px rgba(15,23,42,0.12), 0 2px 8px rgba(15,23,42,0.06);
  pointer-events: none; font-family: 'Heebo', sans-serif;
  font-size: 13px; line-height: 1.5; direction: rtl;
}

/* Expand/Collapse button */
#btn-expand-all {
  position: fixed; bottom: 22px; left: 22px; z-index: 200;
  padding: 9px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border-md);
  border-radius: 12px; font-size: 13px; font-weight: 700;
  font-family: 'Heebo', sans-serif; color: var(--text-muted);
  cursor: pointer; direction: rtl;
  box-shadow: 0 4px 16px rgba(15,23,42,0.10);
  transition: all 0.15s;
}
#btn-expand-all:hover {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
  box-shadow: 0 6px 20px rgba(99,102,241,0.30);
  transform: translateY(-1px);
}

/* Mobile */
@media (max-width: 768px) {
  :root { --header-h: 50px; --sidebar-w: 260px; }
  #sidebar {
    position: fixed; top: var(--header-h); right: 0; bottom: 0;
    z-index: 50; transform: translateX(100%);
    height: calc(100vh - var(--header-h));
    box-shadow: none; transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  }
  #sidebar.open {
    transform: translateX(0);
    box-shadow: -6px 0 32px rgba(15,23,42,0.12);
  }
  #canvas { padding: 10px; }
  .header-title { font-size: 14px; }
  .last-updated { display: none; }
}
</style>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/colors.js?v=5"></script>
<script src="js/mindmap.js?v=5"></script>
<script src="js/app.js?v=5"></script>
</body>
</html>
