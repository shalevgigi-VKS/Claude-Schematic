<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>אבולוציה סכמטית — מפת מערכת Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="logo">🧠</span>
    <span class="header-title">אבולוציה סכמטית</span>
    <span id="viewTitle">מפת המערכת הגלובלית</span>
    <span class="last-updated" id="headerTimestamp"></span>
    <div class="header-controls">
      <button class="btn-icon" onclick="expandAll()">⊞ פתח</button>
      <button class="btn-icon" onclick="collapseAll()">⊟ סגור</button>
      <button class="btn-icon" onclick="resetZoom()">⊙ אפס</button>
      <button class="btn-icon" id="btnRefresh" onclick="refreshData()">↻ עדכן</button>
      <button class="btn-icon" id="btnHamburger" onclick="toggleSidebar()">☰</button>
    </div>
  </header>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar — RIGHT side -->
    <aside id="sidebar">
      <div class="sidebar-section-title">תצוגה</div>

      <div id="globalViewItem" class="active" data-view="global" onclick="setView('global')">
        <span class="sidebar-badge" style="background:#4DB8FF22;color:#4DB8FF;border:1px solid #4DB8FF40">🗺</span>
        <span class="sidebar-label">מפת המערכת הגלובלית</span>
      </div>

      <div class="sidebar-divider"></div>
      <div class="sidebar-section-title">פרויקטים</div>
      <div id="projectList"></div>

      <div class="sidebar-bottom last-updated" id="sidebarTimestamp"></div>
    </aside>

    <!-- Canvas -->
    <div id="canvas">
      <!-- Loading -->
      <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">טוען מפת מערכת…</div>
      </div>
      <!-- Error -->
      <div id="errorMsg"></div>
      <!-- Canvas controls -->
      <div id="canvasControls">
        <button class="canvas-btn" onclick="mindmap?.zoom.scaleBy(mindmap.svg.transition().duration(200), 1.3)" title="הגדל">+</button>
        <button class="canvas-btn" onclick="mindmap?.zoom.scaleBy(mindmap.svg.transition().duration(200), 0.77)" title="הקטן">−</button>
      </div>
    </div>

  </div><!-- /main -->

</div><!-- /app -->

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Legend -->
<div id="legend"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="js/colors.js"></script>
<script src="js/mindmap.js"></script>
<script src="js/app.js"></script>
</body>
</html>
