<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>אבולוציה סכמטית — מפת מערכת Claude</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>"/>
<link rel="stylesheet" href="css/styles.css?v=3"/>
</head>
<body class="dark-theme">

<div id="app">

  <!-- Header -->
  <div id="header">
    <button class="btn-icon hdr-btn" onclick="toggleSidebar()" title="תפריט">☰</button>
    <span class="logo" style="font-size:22px;margin:0 6px">🧠</span>
    <div style="flex:1;min-width:0">
      <div class="header-title" id="viewTitle">מפת המערכת הגלובלית</div>
      <div class="last-updated" id="lastUpdated" style="font-size:11px;color:#94A3B8;margin-top:1px"></div>
    </div>
    <button class="btn-icon hdr-btn" id="btnRefresh" onclick="refreshData()" title="רענן">↺</button>
  </div>

  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">
      <div style="padding:14px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94A3B8">
        פרויקטים
      </div>
      <div id="projectList">
        <!-- populated by app.js -->
      </div>
      <div style="padding:8px 16px 14px;border-top:1px solid #1E3A5F;margin-top:8px">
        <div class="sidebar-item" data-view="global" onclick="setView('global')" style="font-weight:700;color:#38BDF8">
          <span style="font-size:16px">🌐</span>
          <span class="sidebar-label">מפה גלובלית</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas">
      <div id="contentArea"></div>
      <div id="loadingOverlay" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;background:rgba(10,15,30,0.85)">
        <div class="spinner" style="width:40px;height:40px;border:3px solid #1E3A5F;border-top-color:#38BDF8;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <div class="loading-text" style="color:#94A3B8;font-size:14px">טוען נתונים...</div>
      </div>
      <div id="errorMsg" style="display:none"></div>
    </div>

  </div>

</div>

<script src="js/app.js?v=2"></script>
<script>
  // SPA Fallback: Redirect from 404 to root index
  if (window.location.pathname !== '/' && !window.location.pathname.endsWith('.html')) {
    window.history.replaceState(null, null, '/Claude-Schematic/');
  }
</script>
</body>
</html>
