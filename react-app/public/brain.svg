<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow background -->
  <circle cx="50" cy="50" r="48" fill="url(#glow)"/>

  <!-- Neural network connections -->
  <g stroke="#6366F1" stroke-width="1" opacity="0.5">
    <!-- Center to outer nodes -->
    <line x1="50" y1="50" x2="20" y2="25"/>
    <line x1="50" y1="50" x2="50" y2="15"/>
    <line x1="50" y1="50" x2="80" y2="25"/>
    <line x1="50" y1="50" x2="85" y2="55"/>
    <line x1="50" y1="50" x2="70" y2="82"/>
    <line x1="50" y1="50" x2="30" y2="82"/>
    <line x1="50" y1="50" x2="15" y2="55"/>
    <!-- Outer-to-outer connections -->
    <line x1="20" y1="25" x2="50" y2="15"/>
    <line x1="50" y1="15" x2="80" y2="25"/>
    <line x1="80" y1="25" x2="85" y2="55"/>
    <line x1="85" y1="55" x2="70" y2="82"/>
    <line x1="70" y1="82" x2="30" y2="82"/>
    <line x1="30" y1="82" x2="15" y2="55"/>
    <line x1="15" y1="55" x2="20" y2="25"/>
    <!-- Mid-layer connections -->
    <line x1="35" y1="35" x2="65" y2="35"/>
    <line x1="35" y1="35" x2="35" y2="65"/>
    <line x1="65" y1="35" x2="65" y2="65"/>
    <line x1="35" y1="65" x2="65" y2="65"/>
    <line x1="20" y1="25" x2="35" y2="35"/>
    <line x1="80" y1="25" x2="65" y2="35"/>
    <line x1="85" y1="55" x2="65" y2="65"/>
    <line x1="15" y1="55" x2="35" y2="65"/>
    <line x1="70" y1="82" x2="65" y2="65"/>
    <line x1="30" y1="82" x2="35" y2="65"/>
  </g>

  <!-- Mid-layer nodes -->
  <g fill="#818CF8">
    <circle cx="35" cy="35" r="4"/>
    <circle cx="65" cy="35" r="4"/>
    <circle cx="65" cy="65" r="4"/>
    <circle cx="35" cy="65" r="4"/>
  </g>

  <!-- Outer nodes -->
  <g fill="#6366F1">
    <circle cx="20" cy="25" r="4.5"/>
    <circle cx="50" cy="15" r="4.5"/>
    <circle cx="80" cy="25" r="4.5"/>
    <circle cx="85" cy="55" r="4.5"/>
    <circle cx="70" cy="82" r="4.5"/>
    <circle cx="30" cy="82" r="4.5"/>
    <circle cx="15" cy="55" r="4.5"/>
  </g>

  <!-- Center node (bright) -->
  <circle cx="50" cy="50" r="7" fill="#A5B4FC"/>
  <circle cx="50" cy="50" r="4" fill="#EEF2FF"/>
</svg>
