name: Schematic — Deploy & Notify

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: schematic-pages
  cancel-in-progress: true

jobs:
  deploy-and-notify:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify iPhone — site updated
        if: success()
        run: |
          DEPLOY_TIME=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M IL')
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: אבולוציה סכמטית — עיצוב חדש נפרס ✅" \
            -H "Priority: default" \
            -H "Tags: brain" \
            -H "Click: ${{ steps.deploy.outputs.page_url }}" \
            -d "מפת המערכת עודכנה ב-GitHub Pages — ${DEPLOY_TIME}"

      - name: Notify iPhone — deploy failed
        if: failure()
        run: |
          NOW=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M IL')
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: אבולוציה סכמטית — פריסה נכשלה ⚠️" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "פריסה נכשלה — $NOW — בדוק GitHub Actions"
