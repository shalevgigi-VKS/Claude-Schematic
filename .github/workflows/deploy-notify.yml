name: Schematic — Notify on Push

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify iPhone — site updated
        run: |
          curl -s -X POST https://ntfy.sh -H 'Content-Type: application/json' --data-binary '{"topic":"CloudeCode","title":"אבולוציה סכמטית — עודכן ✅","message":"","priority":4,"tags":["white_check_mark"],"click":"https://claude-brain-sg.vercel.app"}'
