name: Schematic — Notify on Push

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify iPhone — code updated
        run: |
          COMMIT="${{ github.event.head_commit.message }}"
          NOW=$(TZ=Asia/Jerusalem date +'%d.%m.%Y %H:%M')
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: אבולוציה סכמטית — קוד עודכן ✅" \
            -H "Priority: low" \
            -H "Tags: brain" \
            -H "Click: https://evolution-schematic.vercel.app" \
            -d "commit: $COMMIT — $NOW"
