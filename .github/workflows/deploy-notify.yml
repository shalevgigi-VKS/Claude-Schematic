name: Schematic — Notify on Push

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify iPhone — code updated
        run: |
          curl -s -X POST https://ntfy.sh/CloudeCode \
            -H "Title: אבולוציה סכמטית — עודכן ✅" \
            -H "Priority: low" \
            -H "Tags: white_check_mark" \
            -H "Click: https://evolution-schematic.vercel.app"
